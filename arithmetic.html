<html ng-app="calcApp">
<head>
<title>Arithmetic Operations</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="CalcController">
<h2>Arithmetic Operations</h2>
<label for="num1">Enter Number 1:</label>
<input type="number" id="num1" ng-model="num1"><br><br>
<label for="num2">Enter Number 2:</label>
<input type="number" id="num2" ng-model="num2"><br><br>
<button ng-click="add()">Add</button>
<button ng-click="sub()">Subtract</button>
<button ng-click="mul()">Multiply</button>
<button ng-click="div()">Divide</button>
<h3>Result: {{result}}</h3>
<script>
var app = angular.module("calcApp", []);
app.controller("CalcController", function($scope)
{
$scope.add = function()
{
$scope.result = $scope.num1 + $scope.num2;
};
$scope.sub = function() 
{
$scope.result = $scope.num1 - $scope.num2;
};
$scope.mul = function()
{
$scope.result = $scope.num1 * $scope.num2;
};
$scope.div = function()
{
$scope.result = $scope.num1 / $scope.num2;
};
});
</script>
</body>
</html>
