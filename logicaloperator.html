<html>
<head>
<title>Logic Gate Tester</title>
<style>
body {
font-family: 'Segoe UI', Arial, sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.container {
background: white;
padding: 2rem;
border-radius: 15px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
text-align: center;
width: 350px;
}
h2 {
color: darkslategray; 
margin-top: 0;
}
.status {
background: whitesmoke;
padding: 10px;
border-radius: 8px;
margin-bottom: 20px;
font-size: 0.9em;
border: 1px solid black;
}
select {
width: 100%;
padding: 12px;
margin-bottom: 15px;
border: 2px solid black;
border-radius: 8px;
outline: none;
cursor: pointer;
}
button {
width: 100%;
padding: 12px;
background-color: blue;
color: white;
border: none;
border-radius: 8px;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}
button:hover {
background-color: purple;
}
#resultDisplay {
margin-top: 20px;
padding: 15px;
border-radius: 8px;
font-size: 1.1em;
font-weight: bold;
color: grey;
border-left: 5px solid cornflowerblue; 
background: aliceblue; 
}
</style>
</head>
<body>
<div class="container">
<h2>Logic Tester</h2>
<div class="status">Variables: <b>a = true</b> | <b>b = false</b></div>
<select id="choice">
<option value="1">AND Operation (&&)</option>
<option value="2">OR Operation (||)</option>
<option value="3">NOT Operation (!a)</option>
</select>
<button onclick="calculate()">Run Logic</button>
<div id="resultDisplay">Result will appear here...</div>
</div>
<script>
function calculate() {
const choice = document.getElementById("choice").value;
const display = document.getElementById("resultDisplay");
const a = true;
const b = false;
let output = "";
switch (choice) {
case "1":
output = `Result: ${a && b}`;
break;
case "2":
output = `Result: ${a || b}`;
break;
case "3":
output = `Result: ${!a}`;
break;
default:
output = "Error: Invalid Choice";
}
display.innerText = output;
}
</script>
</body>
</html>
